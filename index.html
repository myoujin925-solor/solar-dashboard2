<title>SolarManager - 太陽光・蓄電池 投資回収管理</title>

<!-- React 18（バージョン固定） -->
<!-- CDNではなく、同じリポジトリ内に置いたローカルファイルから読み込む（回線側のCDNブロック対策） -->
<script src="react.production.min.js"></script>
<script src="react-dom.production.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f2f2f7; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root">
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; color:#8a8a8e; font-family:-apple-system,'Hiragino Sans',sans-serif;">
    読み込み中…
  </div>
</div>

<script>
  // [デバッグ表示] iPadのSafariには開発者ツールが無く、コンソールログを直接確認できないため、
  // スクリプトの読み込み失敗（CDNブロック等）と実行時エラー（例外）の両方を画面に表示する。
  function showLoadError(title, detail) {
    document.getElementById("root").innerHTML =
      '<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; ' +
      'flex-direction:column; gap:12px; padding:24px; text-align:center; color:#3c3c43; ' +
      'font-family:-apple-system,\'Hiragino Sans\',sans-serif;">' +
      '<div style="font-size:32px;">⚠️</div>' +
      '<div style="font-weight:600; font-size:16px;">' + title + '</div>' +
      '<div style="font-size:12px; color:#8a8a8e; max-width:560px; line-height:1.6; ' +
      'word-break:break-all; text-align:left; background:#fff; padding:12px; border-radius:8px;">' +
      detail + '</div></div>';
  }
  window.addEventListener("error", function (e) {
    if (window.__solarDashboardLoaded) return;
    if (e.target && e.target.tagName === "SCRIPT") {
      showLoadError("スクリプトの読み込みに失敗しました", "URL: " + (e.target.src || "不明"));
    } else if (e.message) {
      // スクリプト自体は読み込めたが、実行中に例外が発生したケース
      showLoadError("実行時エラーが発生しました",
        "メッセージ: " + e.message + "<br>場所: " + (e.filename || "不明") + ":" + (e.lineno || "?") + ":" + (e.colno || "?"));
    }
  }, true);
</script>

     \u3059\u3079\u3066\u306Etransition/animation\u3092\u5B9F\u8CEA\u7121\u52B9\u5316\u3059\u308B\uFF08\u30A2\u30AF\u30BB\u30B7\u30D3\u30EA\u30C6\u30A3\u5BFE\u5FDC\uFF09\u3002 */

     \u5E38\u6642\u8868\u793A\u3055\u308C\u308B\u554F\u984C\u3092\u907F\u3051\u3064\u3064\u3001\u5916\u90E8\u30AD\u30FC\u30DC\u30FC\u30C9\u63A5\u7D9A\u6642\u306E\u30CA\u30D3\u30B2\u30FC\u30B7\u30E7\u30F3\u3092\u88DC\u52A9\u3067\u304D\u308B\u3002
     \u30DC\u30BF\u30F3\u30FB\u30EA\u30F3\u30AF\u30FB\u30BF\u30D6\u7B49\u3001\u30D6\u30E9\u30A6\u30B6\u65E2\u5B9A\u306Eoutline\u304C\u52B9\u304D\u306B\u304F\u3044\u8981\u7D20\u3092\u4E2D\u5FC3\u306B\u30AB\u30D0\u30FC\u3059\u308B\u3002 */
  :focus-visible {
    outline: 2px solid ${e.blue};
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* form-input/form-select\u306F\u72EC\u81EA\u306E\u30D5\u30A9\u30FC\u30AB\u30B9\u8868\u73FE\uFF08box-shadow\u306E\u8F2A\u90ED\uFF09\u3092\u65E2\u306B\u6301\u3064\u305F\u3081\u3001
     :focus-visible\u306E\u592A\u3044outline\u304C\u4E8C\u91CD\u306B\u4E57\u3089\u306A\u3044\u3088\u3046\u6253\u3061\u6D88\u3059 */
  .form-input:focus-visible, .form-select:focus-visible {
    outline: none;
  }

  body, #root {
    min-height: 100vh;
    background: ${e.bg};
    color: ${e.textPrimary};
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }

  .mono { font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }

  /* \u2500\u2500 \u30B9\u30AF\u30ED\u30FC\u30EB\u30D0\u30FC \u2500\u2500 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: ${e.border}; border-radius: 3px; }

  /* \u2500\u2500 \u30EC\u30A4\u30A2\u30A6\u30C8 \u2500\u2500 */
  .app-shell {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* \u2500\u2500 \u30C8\u30C3\u30D7\u30D0\u30FC\uFF08\u5927\u898B\u51FA\u3057\u578B\u3002iOS\u7D14\u6B63\u30A2\u30D7\u30EA\u306E\u5927\u578B\u30CA\u30D3\u30B2\u30FC\u30B7\u30E7\u30F3\u30BF\u30A4\u30C8\u30EB\u3092\u53C2\u7167\uFF09 \u2500\u2500 */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: ${e.bg}EE;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid ${e.border};
    display: flex;
    align-items: center;
    gap: 12px;
    /* [Phase 3] \u6A2A\u5411\u304D\u5229\u7528\u6642\u306B\u30CE\u30C3\u30C1\u5074\u306E\u4F59\u767D\u3092\u78BA\u4FDD */
    padding: 0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
    height: 52px;
    /* [Phase 3] sticky\u7E2E\u5C0F\u30A2\u30CB\u30E1\uFF1A\u9AD8\u3055\u30FB\u5F71\u306E\u5909\u5316\u3092\u6ED1\u3089\u304B\u306B\u3059\u308B */
    transition: height 0.2s ease, box-shadow 0.2s ease;
  }

  /* [Phase 3] \u30B9\u30AF\u30ED\u30FC\u30EB\u6642\uFF1A\u5C11\u3057\u3060\u3051\u7E2E\u3081\u3066\u3001\u5F71\u3092\u8DB3\u3059\u3053\u3068\u3067\u300C\u30DA\u30FC\u30B8\u306E\u4E0B\u306B
     \u6C88\u307F\u8FBC\u3093\u3060\u300D\u611F\u3092\u51FA\u3059\uFF08iOS\u306E\u5927\u898B\u51FA\u3057\u30CA\u30D3\u30B2\u30FC\u30B7\u30E7\u30F3\u30BF\u30A4\u30C8\u30EB\u306E\u53CE\u7E2E\u3092\u53C2\u7167\uFF09 */
  .topbar.scrolled {
    height: 44px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .topbar-logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: ${e.textPrimary};
    line-height: 1.2;
    /* [Phase 3] \u30B5\u30D6\u30BF\u30A4\u30C8\u30EB\u304C\u6D88\u3048\u308B\u5206\u3001\u7E26\u4F4D\u7F6E\u304C\u30AC\u30BF\u3064\u304B\u306A\u3044\u3088\u3046transition\u3092\u63C3\u3048\u308B */
    transition: font-size 0.2s ease;
  }

  .topbar.scrolled .topbar-logo-text { font-size: 15px; }

  .topbar-logo-sub {
    font-size: 11px;
    color: ${e.textMuted};
    font-weight: 400;
    /* [Phase 3] \u30B9\u30AF\u30ED\u30FC\u30EB\u6642\u306F\u30B5\u30D6\u30BF\u30A4\u30C8\u30EB\u3092\u30D5\u30A7\u30FC\u30C9\uFF0B\u6298\u308A\u7573\u3093\u3067\u7E2E\u5C0F\u306B\u5BC4\u4E0E\u3055\u305B\u308B */
    max-height: 14px;
    opacity: 1;
    overflow: hidden;
    transition: opacity 0.15s ease, max-height 0.2s ease;
  }

  .topbar.scrolled .topbar-logo-sub {
    opacity: 0;
    max-height: 0;
  }

  .topbar-divider {
    width: 1px;
    height: 24px;
    background: ${e.border};
    margin: 0 4px;
  }

  /* \u2500\u2500 \u30C7\u30B9\u30AF\u30C8\u30C3\u30D7\u7528 \u4E0A\u90E8\u30BF\u30D6 \u2500\u2500 */
  .nav-tabs-top {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
  }

  .nav-tab-top {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: ${e.textSecondary};
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }

  .nav-tab-top:hover { background: ${e.panel}; color: ${e.textPrimary}; }

  .nav-tab-top.active {
    background: ${e.blue}14;
    color: ${e.blue};
  }

  /* \u2500\u2500 \u30E2\u30D0\u30A4\u30EB\u7528 \u30DC\u30C8\u30E0\u30CA\u30D3\uFF08iOS\u7D14\u6B63TabBar\uFF09 \u2500\u2500 */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    background: ${e.bg}F2;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 0.5px solid ${e.border};
    padding-bottom: max(2px, env(safe-area-inset-bottom));
  }

  .bottom-nav-inner {
    display: flex;
    justify-content: space-around;
    align-items: stretch;
    /* [Phase 3] \u6A2A\u5411\u304D\u5229\u7528\u6642\u306B\u30CE\u30C3\u30C1\u5074\u306E\u30BF\u30D6\u304C\u96A0\u308C\u306A\u3044\u3088\u3046\u4F59\u767D\u3092\u78BA\u4FDD */
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  .bottom-nav-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 6px 2px 4px;
    border: none;
    background: transparent;
    color: ${e.textMuted};
    font-family: inherit;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    flex: 1;
    min-height: 48px; /* [Phase 3] \u30BF\u30C3\u30C1\u30BF\u30FC\u30B2\u30C3\u30C8\u78BA\u4FDD */
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .bottom-nav-tab.active { color: ${e.blue}; font-weight: 600; }

  .bottom-nav-icon { font-size: 22px; line-height: 1; }
  .bottom-nav-label { line-height: 1; }

  @media (max-width: 700px) {
    .nav-tabs-top, .topbar-divider, .topbar-status { display: none !important; }
    .bottom-nav { display: block; }
    /* [Phase 3] \u30DC\u30C8\u30E0\u30CA\u30D3\u81EA\u4F53\u304CSafe Area\u5206\u306E\u9AD8\u3055\u3092\u5185\u90E8padding\u3067\u78BA\u4FDD\u3057\u3066\u3044\u308B\u305F\u3081\u3001
       app-shell\u5074\u306E\u907F\u3051\u5206\u3082Safe Area\u8FBC\u307F\u306E\u53EF\u5909\u5024\u306B\u3059\u308B\uFF08\u56FA\u5B9A74px\u3060\u3068\u30DB\u30FC\u30E0\u30A4\u30F3\u30B8\u30B1\u30FC\u30BF\u30FC\u306E
       \u5927\u304D\u3044\u7AEF\u672B\u3067\u30B3\u30F3\u30C6\u30F3\u30C4\u672B\u5C3E\u304C\u30CA\u30D3\u306B\u96A0\u308C\u308B\u53EF\u80FD\u6027\u304C\u3042\u3063\u305F\uFF09 */
    .app-shell { padding-bottom: calc(74px + env(safe-area-inset-bottom)); }
    /* [Phase 3] iPhone\u6A2A\u5411\u304D\u6642\u3001\u30CE\u30C3\u30C1\u5074\u306E\u30B3\u30F3\u30C6\u30F3\u30C4\u304C\u96A0\u308C\u306A\u3044\u3088\u3046\u5DE6\u53F3\u306BSafe Area\u3092\u52A0\u7B97 */
    .main-content {
      padding: 12px max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
    }
  }

  /* \u2500\u2500 [Phase 3] iPad\u5E45\uFF081024px\u4EE5\u4E0A\uFF09\uFF1A\u5DE6\u30B5\u30A4\u30C9\u30D0\u30FC\u30EC\u30A4\u30A2\u30A6\u30C8 \u2500\u2500
     iPad\u306E\u6A2A\u5411\u304D\u30FBSplit View\u5168\u753B\u9762\u306A\u3069\u3001\u5341\u5206\u306A\u6A2A\u5E45\u304C\u3042\u308B\u5834\u5408\u306F
     \u30B9\u30DE\u30DB\u7684\u306A\u30DC\u30C8\u30E0\u30CA\u30D3\uFF0FPC\u7684\u306A\u4E0A\u90E8\u30BF\u30D6\u3067\u306F\u306A\u304F\u3001\u5DE6\u30B5\u30A4\u30C9\u30D0\u30FC\u5E38\u99D0\u306B\u5207\u308A\u66FF\u3048\u308B\u3002
     \u3053\u308C\u306B\u3088\u308AiPad\u3089\u3057\u3044\u300C\u30A2\u30D7\u30EA\u3089\u3057\u3055\u300D\u304C\u51FA\u308B\u3002 */
  .app-shell-with-sidebar {
    display: flex;
    flex-direction: row;
    min-height: 100vh;
  }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: ${e.surface};
    border-right: 1px solid ${e.border};
    display: flex;
    flex-direction: column;
    /* [Phase 3] \u4E0A\u7AEF\uFF08\u30CE\u30C3\u30C1/\u30AB\u30E1\u30E9\uFF09\u30FB\u4E0B\u7AEF\uFF08\u30DB\u30FC\u30E0\u30A4\u30F3\u30B8\u30B1\u30FC\u30BF\u30FC\uFF09\u30FB\u5DE6\u7AEF\uFF08\u753B\u9762\u5DE6\u7AEF\u306B
       \u63A5\u3057\u3066\u3044\u308B\u305F\u3081\u3001\u6A2A\u5411\u304D\u6642\u306E\u30CE\u30C3\u30C1/\u4E38\u307F\uFF09\u306E3\u65B9\u5411\u306B\u5BFE\u5FDC */
    padding: max(20px, env(safe-area-inset-top)) 12px max(20px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px 20px;
  }

  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sidebar-tab {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: ${e.textSecondary};
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    min-height: 44px; /* [Phase 3] \u30BF\u30C3\u30C1\u30BF\u30FC\u30B2\u30C3\u30C844pt\u78BA\u4FDD */
  }

  .sidebar-tab:hover { background: ${e.panel}; }

  .sidebar-tab.active {
    background: ${e.blue}14;
    color: ${e.blue};
    font-weight: 600;
  }

  .sidebar-tab-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sidebar-status {
    margin-top: auto;
    padding: 12px 10px 4px;
    font-size: 11px;
    color: ${e.textMuted};
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .content-with-sidebar {
    flex: 1;
    min-width: 0;
    padding: 32px 40px max(32px, env(safe-area-inset-bottom));
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    /* [Phase 4] \u30BF\u30D6\u5207\u66FF\u30AF\u30ED\u30B9\u30D5\u30A7\u30FC\u30C9\u306E\u305F\u3081\u57FA\u6E96\u3092\u4F5C\u308B\uFF08main-content\u3068\u540C\u69D8\uFF09 */
    position: relative;
  }

  /* [Phase 3] 5\u6BB5\u968E\u30D6\u30EC\u30FC\u30AF\u30DD\u30A4\u30F3\u30C8\u306E\u3046\u3061\u6700\u5927\u5E45\u5E2F\uFF08iPad Pro 12.9"\u6A2A\u5411\u304D\u306A\u3069\uFF09\u3002
     \u5DE6\u30B5\u30A4\u30C9\u30D0\u30FC\uFF0B\u4E2D\u592E\u30B3\u30F3\u30C6\u30F3\u30C4\u306E2\u30DA\u30A4\u30F3\u69CB\u6210\u306F\u7DAD\u6301\u3057\u3064\u3064\u3001\u30B3\u30F3\u30C6\u30F3\u30C4\u5E45\u306E
     \u4E0A\u9650\u3060\u3051\u3092\u5E83\u3052\u3066\u4F59\u767D\u3092\u6709\u52B9\u6D3B\u7528\u3059\u308B\uFF083\u30DA\u30A4\u30F3\u5316\u306F\u5225\u30BF\u30B9\u30AF\u3068\u3057\u3066\u6271\u3046\uFF09\u3002 */
  @media (min-width: 1366px) {
    .content-with-sidebar {
      max-width: 1180px;
      padding: 40px 48px max(40px, env(safe-area-inset-bottom));
    }
    .kpi-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  /* \u30EC\u30A4\u30A2\u30A6\u30C8\u81EA\u4F53\u306E\u5207\u66FF\u306FJS\u5074\u306EisPad\uFF08useMediaQuery\uFF09\u5224\u5B9A\u3067\u884C\u3046\u305F\u3081\u3001
     \u3053\u3053\u3067\u306FCSS\u306B\u3088\u308B\u8868\u793A/\u975E\u8868\u793A\u306E\u81EA\u52D5\u5207\u66FF\u306F\u884C\u308F\u306A\u3044\u3002
     \uFF08\u4E21\u65B9\u3092\u540C\u6642\u306B\u30EC\u30F3\u30C0\u30FC\u3059\u308B\u3068\u30D5\u30A9\u30FC\u30E0\u5165\u529B\u4E2D\u306Estate\u304C\u4E8C\u91CD\u5316\u3059\u308B\u4E8B\u6545\u306B\u3064\u306A\u304C\u308B\u305F\u3081\uFF09 */

  /* \u2500\u2500 \u30E1\u30A4\u30F3\u30B3\u30F3\u30C6\u30F3\u30C4 \u2500\u2500 */
  .main-content {
    flex: 1;
    padding: 20px 24px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    /* [Phase 4] \u30BF\u30D6\u5207\u66FF\u30AF\u30ED\u30B9\u30D5\u30A7\u30FC\u30C9\u306E\u305F\u3081\u3001\u975E\u30A2\u30AF\u30C6\u30A3\u30D6\u30D1\u30CD\u30EB\u3092absolute\u914D\u7F6E\u3067\u304D\u308B\u3088\u3046\u57FA\u6E96\u3092\u4F5C\u308B */
    position: relative;
  }

  /* [Phase 4] \u30BF\u30D6\u5207\u66FF\u30AF\u30ED\u30B9\u30D5\u30A7\u30FC\u30C9\u3002
     \u65E2\u5B58\u65B9\u91DD\uFF08\u5168\u30BF\u30D6\u5E38\u6642\u30DE\u30A6\u30F3\u30C8\u3057\u30D5\u30A9\u30FC\u30E0\u5165\u529B\u3092\u4FDD\u6301\uFF09\u306F\u305D\u306E\u307E\u307E\u7DAD\u6301\u3057\u3001
     display:none \u21C4 block \u306E\u4EE3\u308F\u308A\u306B opacity \u3060\u3051\u3092\u30A2\u30CB\u30E1\u30FC\u30B7\u30E7\u30F3\u3055\u305B\u308B\u3002
     \u975E\u30A2\u30AF\u30C6\u30A3\u30D6\u6642\u306F pointer-events:none \u3067\u8AA4\u64CD\u4F5C\u3092\u9632\u304E\u3001position:absolute \u3067
     \u30EC\u30A4\u30A2\u30A6\u30C8\u306B\u9AD8\u3055\u3092\u6B8B\u3055\u306A\u3044\uFF08\u8907\u6570\u30D1\u30CD\u30EB\u304C\u540C\u6642\u306B\u9AD8\u3055\u3092\u6301\u3064\u3068\u7E26\u306B\u4F38\u3073\u3066\u3057\u307E\u3046\u305F\u3081\uFF09\u3002 */
  .tab-panel {
    transition: opacity 0.18s ease;
  }

  .tab-panel.tab-panel-inactive {
    /* position:absolute\u306E\u6642\u70B9\u3067\u30EC\u30A4\u30A2\u30A6\u30C8\u30D5\u30ED\u30FC\u304B\u3089\u5916\u308C\u308B\u305F\u3081\u3001.main-content \u306E
       \u9AD8\u3055\u306B\u306F\u5F71\u97FF\u3057\u306A\u3044\uFF08height\u6307\u5B9A\u306F\u4E0D\u8981\u3001\u304B\u3064inset:0\u3068\u885D\u7A81\u3059\u308B\u305F\u3081\u4F7F\u308F\u306A\u3044\uFF09 */
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .tab-panel.tab-panel-active {
    opacity: 1;
    position: relative;
  }

  @media (prefers-reduced-motion: reduce) {
    .tab-panel { transition: none; }
  }

  /* \u2500\u2500 \u30DA\u30FC\u30B8\u30D8\u30C3\u30C0\u30FC\uFF08\u5927\u898B\u51FA\u3057\uFF09 \u2500\u2500 */
  .page-header {
    margin-bottom: 28px;
    padding-top: 8px;
  }

  .page-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: clamp(26px, 7vw, 32px); /* [Phase 1] Dynamic Type\u5BFE\u5FDC\uFF1A\u6587\u5B57\u30B5\u30A4\u30BA\u8A2D\u5B9A\u304C\u5927\u304D\u3044\u74B0\u5883\u3067\u3082\u5D29\u308C\u306B\u304F\u3044 */
    font-weight: 700;
    color: ${e.textPrimary};
    letter-spacing: -0.2px;
    line-height: 1.2;
  }

  .page-title-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: ${e.blue};
    flex-shrink: 0;
    box-shadow: 0 2px 6px ${e.blue}55;
  }

  .page-subtitle {
    font-size: 14px;
    color: ${e.textMuted};
    margin-top: 6px;
    font-weight: 500;
  }

  /* \u2500\u2500 \u30AB\u30FC\u30C9\uFF08Apple Wallet\u98A8\uFF1A\u5F71\u306F\u6975\u3081\u3066\u5F31\u304F\uFF09 \u2500\u2500 */
  .card {
    background: ${e.surface};
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: ${e.textMuted};
    letter-spacing: 0.02em;
  }

  /* \u2500\u2500 KPI\u30AB\u30FC\u30C9 \u2500\u2500 */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  @media (max-width: 700px) {
    .kpi-grid {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
  }

  /* [Phase 3] 5\u6BB5\u968E\u30D6\u30EC\u30FC\u30AF\u30DD\u30A4\u30F3\u30C8\u306E\u6700\u5C0F\u5E2F\uFF08iPhone SE\u306A\u3069\u2264480px\uFF09\u3002
     2\u5217\u30B0\u30EA\u30C3\u30C9\u81EA\u4F53\u306F700px\u5E45\u306E\u898F\u5247\u3092\u7D99\u627F\u3057\u3064\u3064\u3001\u30AB\u30FC\u30C9\u5185\u5074\u306E\u4F59\u767D\u3060\u3051\u3092
     \u3055\u3089\u306B\u8A70\u3081\u3066\u3001\u72ED\u3044\u5217\u5E45\u3067\u3082\u6570\u5024\u30FB\u30E9\u30D9\u30EB\u304C\u8A70\u307E\u3089\u306A\u3044\u3088\u3046\u306B\u3059\u308B\u3002 */
  @media (max-width: 480px) {
    .kpi-grid { gap: 8px; }
    .kpi-card { padding: 11px; }
  }

  .kpi-card {
    background: ${e.surface};
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  .kpi-label {
    font-size: 11px;
    font-weight: 500;
    color: ${e.textMuted};
    margin-bottom: 6px;
  }

  .kpi-value {
    font-size: clamp(18px, 5vw, 22px); /* [Phase 1] Dynamic Type\u5BFE\u5FDC */
    font-weight: 700;
    color: ${e.textPrimary};
    letter-spacing: -0.4px;
    line-height: 1.1;
    font-feature-settings: "tnum";
  }

  .kpi-unit {
    font-size: 12px;
    color: ${e.textMuted};
    margin-left: 3px;
    font-weight: 500;
  }

  .kpi-sub {
    font-size: 11px;
    color: ${e.textMuted};
    margin-top: 6px;
  }

  .kpi-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 6px;
  }

  .badge-green { background: ${e.greenDim}; color: ${e.green}; }
  .badge-sun   { background: #FFF3E0; color: ${e.sun}; }
  .badge-red   { background: #FFEBEE; color: ${e.red}; }

  /* \u2500\u2500 \u5927\u304D\u306A\u30D2\u30FC\u30ED\u30FC\u6570\u5024\uFF08\u6295\u8CC7\u56DE\u53CE\u7387\u306A\u3069\u6700\u91CD\u8981\u6307\u6A19\uFF09 \u2500\u2500 */
  .hero-stat {
    text-align: left;
  }

  .hero-stat-label {
    font-size: 13px;
    color: ${e.textMuted};
    font-weight: 500;
    margin-bottom: 4px;
  }

  .hero-stat-value {
    font-size: clamp(40px, 12vw, 52px); /* [Phase 1] Dynamic Type\u5BFE\u5FDC */
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1;
    font-feature-settings: "tnum";
  }

  .hero-stat-unit {
    font-size: 22px;
    font-weight: 600;
    margin-left: 4px;
    color: ${e.textMuted};
  }

  /* \u2500\u2500 \u30B0\u30EA\u30C3\u30C9\u30EC\u30A4\u30A2\u30A6\u30C8 \u2500\u2500 */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 700px) {
    .grid-2 { grid-template-columns: 1fr; }
  }

  /* \u2500\u2500 \u30D7\u30ED\u30B0\u30EC\u30B9\u30D0\u30FC\uFF08iOS\u98A8\uFF1A\u7D30\u304F\u63A7\u3048\u3081\uFF09 \u2500\u2500 */
  .progress-track {
    height: 6px;
    background: ${e.border};
    border-radius: 99px;
    overflow: hidden;
    margin: 10px 0;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* \u2500\u2500 \u7A7A\u72B6\u614B \u2500\u2500 */
  .empty-state {
    text-align: center;
    padding: 56px 20px;
    color: ${e.textMuted};
  }

  .empty-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 15px;
    font-weight: 600;
    color: ${e.textSecondary};
    margin-bottom: 6px;
  }

  .empty-desc {
    font-size: 13px;
    line-height: 1.6;
    color: ${e.textMuted};
  }

  /* \u2500\u2500 \u30DC\u30BF\u30F3\uFF08iOS\u7D14\u6B63\u98A8\uFF1A\u89D2\u4E38\u5927\u304D\u3081\u3001\u5857\u308A or \u30C6\u30AD\u30B9\u30C8\u306E\u307F\uFF09 \u2500\u2500 */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    min-height: 44px; /* [Phase 3] Apple\u306E\u30BF\u30C3\u30C1\u30BF\u30FC\u30B2\u30C3\u30C8\u63A8\u5968\u30B5\u30A4\u30BA(44x44pt)\u3092\u78BA\u4FDD */
  }

  .btn:active { transform: scale(0.97); opacity: 0.8; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary {
    background: ${e.blue};
    color: #FFFFFF;
  }

  .btn-secondary {
    background: ${e.panel};
    color: ${e.blue};
  }

  .btn-danger {
    background: transparent;
    color: ${e.red};
  }

  /* [Phase 3] btn-sm\u306F\u898B\u305F\u76EE\uFF08\u30D1\u30C7\u30A3\u30F3\u30B0\u30FB\u6587\u5B57\u30B5\u30A4\u30BA\uFF09\u306F\u5C0F\u3055\u304F\u3059\u308B\u304C\u3001
     \u30BF\u30C3\u30D7\u5224\u5B9A\u9818\u57DF\u306F\u7591\u4F3C\u8981\u7D20\u306744x44pt\u307E\u3067\u900F\u660E\u306B\u62E1\u5F35\u3059\u308B\uFF08\u898B\u305F\u76EE\u3092\u5D29\u3055\u305A\u8AA4\u64CD\u4F5C\u3092\u9632\u3050\uFF09 */
  .btn-sm {
    padding: 6px 12px;
    font-size: 13px;
    border-radius: 10px;
    min-height: 32px;
    position: relative;
  }

  .btn-sm::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: max(44px, 100%);
    height: 44px;
    transform: translate(-50%, -50%);
  }

  /* \u2500\u2500 \u30D5\u30A9\u30FC\u30E0 \u2500\u2500 */
  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: ${e.textMuted};
    margin-bottom: 6px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 11px 14px;
    background: ${e.panel};
    border: none;
    border-radius: 10px;
    color: ${e.textPrimary};
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: background 0.15s;
  }

  .form-input:focus, .form-select:focus {
    background: ${e.blue}0D;
    box-shadow: 0 0 0 2px ${e.blue}44;
  }

  .form-select option { background: ${e.surface}; }

  .form-hint {
    font-size: 11px;
    color: ${e.textMuted};
    margin-top: 4px;
  }

  /* \u2500\u2500 \u30EA\u30B9\u30C8\u30BB\u30EB\uFF08Apple\u8A2D\u5B9A\u30A2\u30D7\u30EA\u98A8\uFF1A\u3053\u308C\u304C\u30E1\u30A4\u30F3\u306E\u60C5\u5831\u8868\u793A\u5F62\u5F0F\uFF09 \u2500\u2500 */
  .list-group {
    background: ${e.surface};
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  .list-cell {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 0.5px solid ${e.border};
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .list-cell:last-child { border-bottom: none; }
  .list-cell:active { background: ${e.panel}; }
  .list-cell.no-tap { cursor: default; }
  .list-cell.no-tap:active { background: transparent; }

  .list-cell-main {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .list-cell-title {
    font-size: 15px;
    color: ${e.textPrimary};
    font-weight: 500;
  }

  .list-cell-subtitle {
    font-size: 12px;
    color: ${e.textMuted};
  }

  .list-cell-value {
    font-size: 16px;
    font-weight: 600;
    color: ${e.textPrimary};
    font-feature-settings: "tnum";
    text-align: right;
    flex-shrink: 0;
  }

  .list-cell-chevron {
    color: ${e.border};
    font-size: 13px;
    margin-left: 8px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .list-cell-chevron.expanded { transform: rotate(90deg); color: ${e.textMuted}; }

  .list-cell-detail {
    padding: 0 16px 16px 16px;
    background: ${e.panel};
  }

  .list-cell-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 0.5px solid ${e.border};
  }

  .list-cell-detail-row:last-child { border-bottom: none; }

  /* \u2500\u2500 \u30C6\u30FC\u30D6\u30EB\uFF08\u4E00\u90E8\u306E\u8A73\u7D30\u30C7\u30FC\u30BF\u306E\u307F\u3002\u57FA\u672C\u306F\u30EA\u30B9\u30C8\u5F62\u5F0F\u306B\u7F6E\u304D\u63DB\u3048\uFF09 \u2500\u2500 */
  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    font-size: 11px;
    font-weight: 600;
    color: ${e.textMuted};
    padding: 8px 10px;
    text-align: left;
    border-bottom: 0.5px solid ${e.border};
  }

  .data-table td {
    padding: 10px 10px;
    border-bottom: 0.5px solid ${e.border};
    font-size: 13px;
    color: ${e.textSecondary};
  }

  .data-table tr:last-child td { border-bottom: none; }

  .data-table .num {
    color: ${e.textPrimary};
    text-align: right;
    font-feature-settings: "tnum";
  }

  /* \u2500\u2500 \u592A\u967D\u30A2\u30A4\u30B3\u30F3\uFF08\u63A7\u3048\u3081\u306A\u30D1\u30EB\u30B9\u3002\u30C7\u30B6\u30A4\u30F3\u4ED5\u69D8\u306B\u3088\u308A\u767A\u96FB\u76E3\u8996\u611F\u306F\u6392\u9664\u3059\u308B\u305F\u3081\u4F7F\u7528\u983B\u5EA6\u3092\u4E0B\u3052\u308B\uFF09 \u2500\u2500 */
  .sun-icon { display: inline-block; }

  /* \u2500\u2500 \u30C8\u30FC\u30B9\u30C8\u901A\u77E5 \u2500\u2500 */
  .toast-container {
    position: fixed;
    /* [Phase 3] \u30DB\u30FC\u30E0\u30A4\u30F3\u30B8\u30B1\u30FC\u30BF\u30FC\u5206\u306ESafe Area\u3092\u30DC\u30C8\u30E0\u30CA\u30D3\u306E\u9AD8\u3055\u306B\u52A0\u7B97\u3002
       \u56FA\u5B9A90px\u306E\u307E\u307E\u3060\u3068Safe Area\u5206\u3060\u3051\u30DC\u30C8\u30E0\u30CA\u30D3\u3068\u91CD\u306A\u308B\u7AEF\u672B\u304C\u3042\u308B\u305F\u3081\u3001
       env(safe-area-inset-bottom)\u3092\u8003\u616E\u3057\u305F\u53EF\u5909\u5024\u306B\u3059\u308B\u3002 */
    bottom: calc(90px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    width: calc(100% - 32px);
    max-width: 380px;
    /* [Phase 3] \u6A2A\u5411\u304D\u6642\u306B\u30CE\u30C3\u30C1\u5074\u3078\u5BC4\u308A\u3059\u304E\u306A\u3044\u3088\u3046\u5DE6\u53F3\u306E\u6700\u5C0F\u4F59\u767D\u3092\u78BA\u4FDD */
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  .toast {
    background: #1C1C1EE6;
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: 12px 18px;
    font-size: 13px;
    color: #FFFFFF;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: toastIn 0.25s ease;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* [Phase 4] Undo Snackbar\uFF1A\u901A\u5E38\u30C8\u30FC\u30B9\u30C8\u3068\u540C\u3058\u4F4D\u7F6E\u30FB\u30B9\u30BF\u30C3\u30AF\u306B\u7A4D\u3080\u304C\u3001
     \u53F3\u5074\u306B\u300C\u53D6\u308A\u6D88\u3059\u300D\u30DC\u30BF\u30F3\u3092\u6301\u3064\u30D0\u30EA\u30A2\u30F3\u30C8\u3002\u78BA\u8A8D\u30E2\u30FC\u30C0\u30EB\u306E\u4EE3\u308F\u308A\u306B
     \u300C\u5B9F\u884C\u3057\u3066\u304B\u3089\u53D6\u308A\u6D88\u305B\u308B\u300D\u5F62\u306B\u3059\u308B\u3053\u3068\u3067\u3001\u524A\u9664\u306E\u305F\u3073\u306B\u30E2\u30FC\u30C0\u30EB\u3067
     \u30D6\u30ED\u30C3\u30AF\u3055\u308C\u306A\u3044\u8EFD\u5FEB\u306A\u64CD\u4F5C\u611F\u306B\u3059\u308B\uFF08iOS\u7D14\u6B63\u30A2\u30D7\u30EA\u306ESnackbar\u6319\u52D5\u3092\u53C2\u7167\uFF09\u3002 */
  .toast.undo {
    justify-content: space-between;
    gap: 14px;
    /* \u81EA\u52D5\u6D88\u6EC5\u307E\u3067\u306E\u6B8B\u308A\u6642\u9593\u3092\u30D7\u30ED\u30B0\u30EC\u30B9\u30D0\u30FC\u3067\u53EF\u8996\u5316 */
    position: relative;
    overflow: hidden;
  }

  .toast-undo-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: ${e.blue};
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 8px;
    /* [Phase 3\u65B9\u91DD\u3092\u7D99\u7D9A] \u30BF\u30C3\u30D7\u5224\u5B9A\u3092\u5B9F\u5BF8\u3088\u308A\u5E83\u3052\u308B */
    margin: -4px -8px;
  }

  .toast-undo-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: ${e.blue}99;
    animation: toastUndoShrink linear forwards;
  }

  @keyframes toastUndoShrink {
    from { width: 100%; }
    to   { width: 0%; }
  }

  /* \u2500\u2500 \u30BF\u30B0/\u30B9\u30C6\u30FC\u30BF\u30B9 \u2500\u2500 */
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }

  .status-dot.green { background: ${e.green}; }
  .status-dot.sun   { background: ${e.sun}; }
  .status-dot.red   { background: ${e.red}; }

  /* \u2500\u2500 \u8A2D\u5B9A\u753B\u9762\u30FB\u30EA\u30B9\u30C8\u5185\u306E\u884C \u2500\u2500 */
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 0.5px solid ${e.border};
    gap: 12px;
  }

  .settings-row:last-child { border-bottom: none; }

  .settings-row-label {
    font-size: 14px;
    color: ${e.textPrimary};
  }

  .settings-row-hint {
    font-size: 11px;
    color: ${e.textMuted};
    margin-top: 2px;
  }

  /* \u2500\u2500 \u30BB\u30AF\u30B7\u30E7\u30F3\u30E9\u30D9\u30EB\uFF08\u30EA\u30B9\u30C8\u30B0\u30EB\u30FC\u30D7\u306E\u4E0A\u306B\u51FA\u3059\u5C0F\u898B\u51FA\u3057\uFF09 \u2500\u2500 */
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: ${e.textMuted};
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin: 20px 4px 8px;
  }

  .section-label:first-child { margin-top: 0; }

  /* \u2500\u2500 \u30BF\u30C3\u30D7\u3067\u5C55\u958B\u3059\u308B\u8AAC\u660E\u6587\uFF08\u4ED5\u69D8\u2462\uFF1A\u9577\u6587\u306F\u3059\u3079\u3066\u3053\u306E\u5F62\u5F0F\uFF09 \u2500\u2500 */
  .disclosure {
    background: ${e.surface};
    border-radius: 14px;
    overflow: hidden;
  }

  .disclosure-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .disclosure-title {
    font-size: 14px;
    font-weight: 600;
    color: ${e.textPrimary};
  }

  .disclosure-icon {
    color: ${e.blue};
    font-size: 12px;
    transition: transform 0.2s;
  }

  .disclosure-icon.open { transform: rotate(180deg); }

  .disclosure-body {
    padding: 0 16px 16px;
    font-size: 12px;
    color: ${e.textMuted};
    line-height: 1.7;
  }

    if (!window.__solarDashboardLoaded && !document.getElementById("root").querySelector("h1, h2, .app-shell")) {
      showLoadError("読み込みがタイムアウトしました",
        "15秒経っても表示が完了しませんでした。同じリポジトリ内のJSファイル（react.production.min.js等）が" +
        "見つからないか、スクリプトの実行が途中で止まっている可能性があります。");
    }
  }, 15000);
</script>
</body>
